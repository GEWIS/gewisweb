configs:
    init_matomo_db:
        content: |
            mysql_note "Creating Matomo database and user"
            docker_process_sql <<'EOF'
                CREATE DATABASE `${MATOMO_DATABASE_DBNAME:-matomo}`;
                CREATE USER '${MATOMO_DATABASE_USERNAME:-matomo}'@'%' IDENTIFIED BY '${MATOMO_DATABASE_PASSWORD:-matomo}';
                GRANT ALL PRIVILEGES ON `${MATOMO_DATABASE_DBNAME:-matomo}`.* TO '${MATOMO_DATABASE_USERNAME:-matomo}'@'%';
            EOF

volumes:
    mariadb_data:
    matomo:
