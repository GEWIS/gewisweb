# This is a GEWIS mailings template
# External activity sign-up: self-service manage link
---
# All mailings require some settings. These can be set here. Don't forget to set the title ("Algemene mededeling; tekst zelf invoeren")
version: 1.1
settings:
    title: "Manage your sign-up"
    email: "gewisweb@gewis.nl"
    lang: en-UK
    follow: false

# A mailing consists of a series of messageblocks, each with their own type
# The available types are "header", "topblock", "activities", "activityfooter", "extramessage" and "tinyfooter"
messageblocks:

    # Each mailing must have a header to make the template shine! It contains the title and the date.
    - type: "header"
      title: "{{ACTIVITY_NAME}}"
      date: 2024-01-01 # Note that this date needs to be updated

    # This is the first block which is shown on top of the message. Recommended for most messages
    - type: topblock
      title: "Manage your sign-up"
      contentHTML: "</p>
        <p>Dear {{FULL_NAME}},</p>

        <p>Your details have been successfully added to the sign-up list for <em>{{ACTIVITY_NAME}}</em> ({{SIGNUPLIST_NAME}}). As long as the list remains open, you can review your details or remove your name using the link below:</p>

        <p><a href='{{MANAGE_URL}}'>{{MANAGE_URL}}</a></p>

        <p>Please keep this email safe, as this link is the only way to access and manage your sign-up.</p>

        With kind regards,<br/>
        The ApplicatieBeheerCommissie"

    - type: tinyfooter
      contentHTML: >
          You receive this email because you signed up for {{ACTIVITY_NAME}}.
