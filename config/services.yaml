# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.locales: en|nl
    # MFA enforcement defaults to `true` so any unrecognised environment fails safe. Overridden per environment in
    # `when@dev:` (driven by `MFA_ENFORCEMENT` so individual developers can flip enrolment on/off in `.env.local`;
    # because the parameter is read once at first service instantiation under FrankenPHP's worker mode, the web
    # container must be restarted after changing the value), `when@test:` (hardcoded false so CI need not set up
    # TOTP), and `when@prod:` (hardcoded true, immutable, regardless of any environment variable).
    app.mfa.enforcement_enabled: true

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        # Automatically inject the following values into services.
        bind:
            $defaultLocale: '%kernel.default_locale%' # string
            $supportedLocales: '%kernel.enabled_locales%' # array
            $mfaEnforcementEnabled: '%app.mfa.enforcement_enabled%' # bool

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Security/User/HandlerRegistry.php'
    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@dev:
    parameters:
        app.mfa.enforcement_enabled: '%env(bool:MFA_ENFORCEMENT)%'

when@test:
    parameters:
        app.mfa.enforcement_enabled: false

when@prod:
    parameters:
        app.mfa.enforcement_enabled: true
