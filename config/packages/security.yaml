# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: 'argon2id'
            # Approximately 200ms on GEWIS hardware and close to second recommended option from RFC 9106
            # NOTE: Symfony does not allow setting number of threads
            memory_cost: 98304
            time_cost: 3
            migrate_from:
                - bcrypt

    providers:
        user_provider:
            entity:
                class: App\Entity\User\User
        company_user_provider:
            entity:
                class: App\Entity\User\CompanyUser

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api:
            pattern: ^/api
            stateless: true
        company:
            pattern: '^/(%app.locales%)/company'
            lazy: true
            login_throttling: true
            provider: company_user_provider
            form_login:
                login_path: company_user_login
                check_path: company_user_login
                enable_csrf: true
            remember_me:
                always_remember_me: true
                service: app.security.remember_me.company
                name: GWS_COMPANY_REMEMBERME
            two_factor:
                auth_form_path: company_user_mfa_challenge
                check_path: company_user_mfa_challenge_check
                enable_csrf: true
            logout:
                path: company_user_logout
                target: frontpage/index
        main:
            pattern: ^/
            lazy: true
            provider: user_provider
            login_throttling: true
            user_checker: App\Security\User\UserChecker
            form_login:
                login_path: user_login
                check_path: user_login
                enable_csrf: true
            remember_me:
                always_remember_me: true
                service: app.security.remember_me.main
                name: GWS_USER_REMEMBERME
            two_factor:
                auth_form_path: user_mfa_challenge
                check_path: user_mfa_challenge_check
                enable_csrf: true
            logout:
                path: user_logout
                target: frontpage/index

            # https://symfony.com/doc/current/security/impersonating_user.html
            switch_user: { role: ROLE_ADMIN, parameter: _impersonate }

    role_hierarchy:
        ROLE_GUEST: [ 'PUBLIC_ACCESS' ]
        ROLE_TUE_GUEST: [ 'ROLE_GUEST' ]
        ROLE_USER: [ ]
        ROLE_COMPANY_USER: [ ]
        ROLE_API_USER: [ ]
        ROLE_MEMBER: [ 'ROLE_USER' ]
        ROLE_GRADUATE: [ 'ROLE_USER' ]
        ROLE_ACTIVE_MEMBER: [ 'ROLE_MEMBER' ]
        ROLE_COMPANY_ADMIN: [ 'ROLE_ACTIVE_MEMBER' ]
        ROLE_BOARD: [ 'ROLE_ACTIVE_MEMBER', 'ROLE_COMPANY_ADMIN' ] # The board is always considered an active member
        ROLE_ADMIN: [ 'ROLE_BOARD' ]


    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/logout, role: PUBLIC_ACCESS }
        - { path: ^/user/mfa/challenge, role: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/(%app.locales%)/company/mfa/challenge', role: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: '^/(%app.locales%)/admin', roles: [ROLE_ACTIVE_MEMBER, ROLE_BOARD, ROLE_ADMIN] }
        - { path: '^/(%app.locales%)/company', roles: [ROLE_COMPANY_USER] }
        # - { path: ^/profile, roles: ROLE_USER }

when@dev:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: 'argon2id'
                memory_cost: 10
                time_cost: 3

when@test:
    security:
        password_hashers:
            # Secure hashing wastes time in tests, so use the lowest work factor sodium's argon2id allows. Pin argon2id
            # explicitly -- `auto` resolves to bcrypt, which mismatches the seeded (argon2id) fixture hash and forces a
            # rehash on every login -- at the same cost as dev and the fixture, so a seeded user's hash is already
            # "current" and logging in triggers no needless rehash UPDATE.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: argon2id
                memory_cost: 10
                time_cost: 3
