# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
framework:
    messenger:
        failure_transport: failed

        transports:
            failed: 'doctrine://default?queue_name=failed'
            high_priority:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: high_priority
                        type: direct
                    queues:
                        high_priority_queue: ~
            normal_priority:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: normal_priority
                        type: direct
                    queues:
                        normal_priority_queue: ~
            bulk:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: bulk
                        type: direct
                    queues:
                        bulk_queue: ~

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            # Route your messages to the transports
            # 'App\Message\YourMessage': async
            'App\Message\User\PasswordResetRequestEmail': high_priority

when@test:
    framework:
        messenger:
            transports:
                high_priority:
                    dsn: 'in-memory://'
                normal_priority:
                    dsn: 'in-memory://'
                bulk:
                    dsn: 'in-memory://'
