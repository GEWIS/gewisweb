# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
framework:
    messenger:
        failure_transport: failed

        transports:
            failed: 'doctrine://default?queue_name=failed'
            high_priority:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: high_priority
                        type: direct
                    queues:
                        high_priority_queue: ~
            normal_priority:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: normal_priority
                        type: direct
                    queues:
                        normal_priority_queue: ~
            bulk:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: bulk
                        type: direct
                    queues:
                        bulk_queue: ~
            # Dedicated transport for the image pipeline (variant pre-generation + album cover mosaics) so heavy,
            # slow encoding never blocks the priority/bulk email queues and can be scaled independently.
            images:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: images
                        type: direct
                    queues:
                        images_queue: ~

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            # Route your messages to the transports
            # 'App\Message\YourMessage': async
            'App\Message\User\PasswordResetRequestEmail': high_priority
            # Async so the sign-up existence check runs off the request thread (no timing-based enumeration), mirroring
            # the password-reset request above. The initial token email must be async for the same reason: a
            # synchronous SMTP send on a fresh sign-up would make a new address respond slower than an already-signed-up
            # one (which only re-queues a resend), leaking existence through response time.
            'App\Message\Activity\ExternalSignupTokenEmail': high_priority
            'App\Message\Activity\ExternalSignupResendVerificationEmail': high_priority
            'App\Message\Activity\OrganiserAnnouncementEmail': bulk
            'App\Message\User\ExportUserDataMessage': bulk
            'App\Message\Photo\ProcessImageVariantsMessage': images
            'App\Message\Photo\GenerateAlbumCoverMessage': images

when@test:
    framework:
        messenger:
            transports:
                high_priority:
                    dsn: 'in-memory://'
                normal_priority:
                    dsn: 'in-memory://'
                bulk:
                    dsn: 'in-memory://'
                images:
                    dsn: 'in-memory://'
