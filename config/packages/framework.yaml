# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    trusted_headers: ['X-Forwarded-For', 'X-Forwarded-Proto']

    # Let BinaryFileResponse offload private/large file serving to Caddy: when Caddy injects the X-Sendfile-Type request
    # header, Symfony emits the matching X-Accel-Redirect instead of streaming the bytes through PHP. Without the header
    # (dev without the intercept, tests) it degrades to a normal streamed file.
    trust_x_sendfile_type_header: true

    # The session is started ONLY when it is read from or written to.
    session:
        enabled: true
        cookie_samesite: strict
        name: GWS_SESSION
        handler_id: Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler

    http_client:
        scoped_clients:
            gewisdb.client:
                base_uri: '%env(GEWISDB_API_HOST)%'
                auth_bearer: '%env(GEWISDB_API_KEY)%'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
