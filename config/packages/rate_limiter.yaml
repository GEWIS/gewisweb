# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
framework:
    rate_limiter:
        password_reset_ip:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        password_reset_credentials:
            policy: 'fixed_window'
            limit: 10
            interval: '1 hour'
        sudo_confirm_ip:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'
        sudo_confirm_credentials:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        # Anti-abuse for anonymous external activity sign-ups (members are authenticated and skip these). Consumed per
        # IP and per submitted email together, like the password-reset limiters.
        external_signup_ip:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'
        external_signup_email:
            policy: 'fixed_window'
            limit: 3
            interval: '1 hour'
        # Throttles re-sending the external sign-up verification email (resend link), per IP and per email.
        signup_verify_resend_ip:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'
        signup_verify_resend_email:
            policy: 'fixed_window'
            limit: 3
            interval: '1 hour'
