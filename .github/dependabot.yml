version: 2
updates:
    -   package-ecosystem: "composer"
        directory: "/"
        schedule:
            interval: "weekly"
        open-pull-requests-limit: 10
        groups:
            symfony:
                patterns:
                    - "symfony/*"
                    - "symfonycasts/*"
            doctrine:
                patterns:
                    - "doctrine/*"
                    - "doctrineencryptbundle/*"
            api-platform:
                patterns:
                    - "api-platform/*"
            dev-tools:
                patterns:
                    - "phpstan/*"
                    - "psalm/*"
                    - "vimeo/psalm"
                    - "weirdan/doctrine-psalm-plugin"
                    - "phpunit/*"
                    - "gewis/gewisphp-coding-standards"

    -   package-ecosystem: "docker"
        directory: "/"
        schedule:
            interval: "weekly"
        open-pull-requests-limit: 10

    -   package-ecosystem: "docker"
        directory: "/docker/matomo"
        schedule:
            interval: "weekly"
        open-pull-requests-limit: 10

    -   package-ecosystem: "github-actions"
        directory: "/"
        schedule:
            interval: "weekly"
        open-pull-requests-limit: 10
